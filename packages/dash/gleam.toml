name = "app"
version = "1.0.0"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

target = "javascript"

[javascript]
runtime = "bun"
typescript_declarations = true

[tools.lustre.bin]
bun = "system"

[tools.lustre.build]
minify = true
outdir = "./dist"


[tools.lustre.html]
title = "Giolt"
links = [
	{ rel="icon", href="/favicon.svg", type="image/svg+xml" },
	{ rel="preconnect", href="https://fonts.googleapis.com" },
	{ rel="stylesheet", href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" }
]


[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
modem = ">= 2.1.2 and < 3.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
plinth = ">= 0.10.2 and < 1.0.0"

[dev_dependencies]
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"
lucide_lustre = ">= 2.0.3 and < 3.0.0"
