name: "Web: Smoke Test"

on:
  push:
    branches:
      - main
    paths:
      - "packages/web/**"
      
  pull_request:
    branches:
      - main
    paths:
      - "packages/web/**"


jobs:
  smoke-test:
    name: Build Docker Image
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build